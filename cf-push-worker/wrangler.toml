name = "xp-push"
main = "index.js"
compatibility_date = "2024-01-01"

# Despliega con: npx wrangler deploy
# Configura secrets con:
#   npx wrangler secret put FCM_SERVER_KEY
#   npx wrangler secret put FIREBASE_API_KEY
#
# El FCM_SERVER_KEY lo encuentras en:
#   Firebase Console → tu proyecto → ⚙ Configuración
#   → Mensajería en la nube → Clave de servidor
#
# El FIREBASE_API_KEY lo encuentras en:
#   Firebase Console → tu proyecto → ⚙ Configuración
#   → General → Clave de API web (el mismo apiKey de firebase-config.js)

[triggers]
crons = []

# Sin rutas personalizadas — accede en:
# https://xp-push.TU-CUENTA.workers.dev
